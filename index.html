<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOアプリ</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-title">TODOアプリ</h1>
      </header>

      <main class="app-main">
        <section class="task-input-section">
          <form class="task-form" id="task-form" action="#">
            <label for="task-input" class="task-form-label">タスクを入力</label>
            <div class="task-form-controls">
              <input
                type="text"
                id="task-input"
                class="task-input"
                placeholder="例：買い物に行く"
                autocomplete="off"
              >
              <button type="submit" class="task-add-button">追加</button>
            </div>
          </form>
        </section>

        <section class="task-list-section">
          <h2 class="task-list-title">タスク一覧</h2>
          <ul class="task-list" id="task-list"></ul>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
