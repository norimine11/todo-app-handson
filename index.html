<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOアプリ</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-title">TODOアプリ</h1>
      </header>

      <main class="app-main">
        <section class="task-input-section">
          <form class="task-form" action="#">
            <label for="task-input" class="task-form-label">タスクを入力</label>
            <div class="task-form-controls">
              <input
                type="text"
                id="task-input"
                class="task-input"
                placeholder="例：買い物に行く"
              >
              <button type="submit" class="task-add-button">追加</button>
            </div>
          </form>
        </section>

        <section class="task-list-section">
          <h2 class="task-list-title">タスク一覧</h2>
          <ul class="task-list">

            <!-- 未完了タスク -->
            <li class="task-item">
              <label class="task-item-label">
                <input type="checkbox" class="task-checkbox">
                <span class="task-text">牛乳を買う</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>

            <!-- 未完了タスク -->
            <li class="task-item">
              <label class="task-item-label">
                <input type="checkbox" class="task-checkbox">
                <span class="task-text">メールを返信する</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>

            <!-- 完了済みタスク -->
            <li class="task-item is-completed">
              <label class="task-item-label">
                <input type="checkbox" class="task-checkbox" checked>
                <span class="task-text">資料をまとめる</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>

            <!-- 完了済みタスク -->
            <li class="task-item is-completed">
              <label class="task-item-label">
                <input type="checkbox" class="task-checkbox" checked>
                <span class="task-text">ミーティングの準備をする</span>
              </label>
              <div class="task-actions">
                <button type="button" class="task-edit-button">編集</button>
                <button type="button" class="task-delete-button">削除</button>
              </div>
            </li>

          </ul>
        </section>
      </main>
    </div>
  </body>
</html>
